<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Token Art — Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="titlewall">
  <h1>Token Art</h1>
  <p>A generative collection — each piece born from a session of tokens.</p>
  <div class="counter" id="counter">—</div>
</div>
<div class="banner" id="banner">🎨 Your gallery is ready — <span id="bannerCount">0</span> pieces</div>
<div class="sessions" id="sessions"></div>
<div class="masonry" id="masonry"></div>
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lbClose">&times;</span>
  <div class="lb-inner">
    <canvas id="lbCanvas"></canvas>
    <h2 id="lbTitle"></h2>
    <div class="pl" id="lbPlaque"></div>
  </div>
</div>
<script type="module" src="app.js"></script>
<div class="toolbar" id="toolbar">
  <button id="simBtn">＋ Simulate session</button>
  <button id="driverBtn">✎ Driver</button>
  <button id="postBtn">⤴ Post</button>
</div>
<div class="drawer" id="driverDrawer">
  <h3>Creative direction (driver.md)</h3>
  <textarea id="driverText" spellcheck="false"></textarea>
  <div class="drawer-row">
    <button id="driverRandom">Set to random</button>
    <button id="driverSave">Save</button>
  </div>
</div>
<script type="module" src="live.js"></script>
</body>
</html>
